version: "3.8"
services:
  backend:
    build: ./backend
    ports: ["3001:3001"]
    environment: [RUST_LOG=info, PORT=3001]
    restart: unless-stopped
  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [backend]
    environment: [NEXT_PUBLIC_API_URL=http://localhost:3001]
    restart: unless-stopped
  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    volumes: ["./nginx.conf:/etc/nginx/nginx.conf:ro"]
    depends_on: [frontend, backend]
    restart: unless-stopped
